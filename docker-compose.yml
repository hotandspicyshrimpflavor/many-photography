version: '3.8'

services:
  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - many-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: many_photography
      POSTGRES_USER: many
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U many -d many_photography"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - many-network

  # MinIO (S3-compatible storage for photos/videos)
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-many-access-key}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-many-secret-key}
    volumes:
      - minio-data:/data
    networks:
      - many-network

  # MinIO Client (for bucket initialization)
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-many-access-key} $${MINIO_SECRET_KEY:-many-secret-key};
      mc mb myminio/$${MINIO_BUCKET:-many-photography} --ignore-existing;
      mc anonymous set download myminio/$${MINIO_BUCKET:-many-photography};
      exit 0;
      "
    networks:
      - many-network

  # Cloudflare Tunnel (Zero Trust)
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    networks:
      - many-network

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local

networks:
  many-network:
    driver: bridge
